<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lấy Key</title>
    <style>
        /* Giao diện nền trắng, căn giữa màn hình */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        /* Khung chứa nội dung */
        .container {
            text-align: center;
            padding: 30px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            max-width: 360px;
            width: 85%;
        }

        h2 {
            color: #222222;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Khung hiển thị Key */
        .key-box {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 16px;
            border: 2px dashed #0088cc;
            background-color: #f4fafd;
            color: #0088cc;
            margin-bottom: 25px;
            border-radius: 8px;
            word-break: break-all;
        }

        /* Nút bấm sao chép */
        .btn-copy {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-copy:hover {
            background-color: #006699;
        }

        .btn-copy:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Khung Lấy Key Hệ Thống</h2>
    <div class="key-box" id="keyDisplay">Đang tạo...</div>
    <button class="btn-copy" onclick="copyAndRedirect()">Sao chép Key</button>
</div>

<script>
    // Hàm tạo key ngẫu nhiên 9 ký tự (Khớp với bộ ký tự trong script Lua của bạn)
    function generateKey(length) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let key = "";
        for (let i = 0; i < length; i++) {
            const rand = Math.floor(Math.random() * chars.length);
            key += chars.charAt(rand);
        }
        return key;
    }

    // Tự động tạo key khi người dùng vừa tải trang web xong
    const currentKey = generateKey(9);
    document.getElementById("keyDisplay").innerText = currentKey;

    // Hàm thực hiện việc sao chép và chuyển hướng
    function copyAndRedirect() {
        if (navigator.clipboard && window.isSecureContext) {
            // Cách 1: Dùng API sao chép hiện đại của trình duyệt
            navigator.clipboard.writeText(currentKey).then(() => {
                goToTelegram();
            }).catch(() => {
                fallbackCopy(currentKey); // Nếu cách 1 lỗi thì tự chuyển sang cách 2
            });
        } else {
            // Cách 2: Dùng cho các thiết bị cũ hoặc trình duyệt bị giới hạn bảo mật
            fallbackCopy(currentKey);
        }
    }

    // Hàm sao chép dự phòng bằng ô văn bản ẩn (đảm bảo hoạt động 100% trên mọi điện thoại)
    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; // Tránh làm cuộn trang của người dùng
        textArea.style.left = "-999999px"; // Giấu ô văn bản ra khỏi màn hình
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
            document.execCommand('copy'); // Lệnh copy cổ điển nhưng cực kỳ mạnh mẽ
        } catch (err) {
            console.error('Không thể sao chép tự động', err);
        }
        
        document.body.removeChild(textArea);
        goToTelegram();
    }

    // Hàm chuyển hướng sang Telegram nhóm của bạn
    function goToTelegram() {
        window.location.href = "https://t.me/tamnguyenmod";
    }
</script>

</body>
</html>
